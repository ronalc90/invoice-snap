version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: invoicesnap-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: invoicesnap
      POSTGRES_PASSWORD: invoicesnap
      POSTGRES_DB: invoicesnap
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
