version: '3.8'

services:
  # ────────────────────────────────────────────────────────
  # Aplicacion InvoiceSnap
  # ────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: invoicesnap-app
    restart: unless-stopped
    ports:
      - '3003:3003'
    environment:
      - DATABASE_URL=postgresql://invoicesnap:invoicesnap@postgres:5432/invoicesnap
      - NEXTAUTH_URL=http://localhost:3003
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-change-me-in-production}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - invoicesnap-network
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3003']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ────────────────────────────────────────────────────────
  # PostgreSQL
  # ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: invoicesnap-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: invoicesnap
      POSTGRES_PASSWORD: invoicesnap
      POSTGRES_DB: invoicesnap
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - invoicesnap-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U invoicesnap']
      interval: 10s
      timeout: 5s
      retries: 5

  # ────────────────────────────────────────────────────────
  # Prometheus - Metricas
  # ────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: invoicesnap-prometheus
    restart: unless-stopped
    ports:
      - '9090:9090'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    networks:
      - invoicesnap-network

  # ────────────────────────────────────────────────────────
  # Grafana - Dashboards
  # ────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: invoicesnap-grafana
    restart: unless-stopped
    ports:
      - '3001:3000'
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=invoicesnap
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - invoicesnap-network

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  invoicesnap-network:
    driver: bridge
