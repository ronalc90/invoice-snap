apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: invoicesnap-ingress
  namespace: invoicesnap
  labels:
    app: invoicesnap
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - invoicesnap.example.com
      secretName: invoicesnap-tls
  rules:
    - host: invoicesnap.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: invoicesnap-service
                port:
                  number: 80
