apiVersion: apps/v1
kind: Deployment
metadata:
  name: invoicesnap
  namespace: invoicesnap
  labels:
    app: invoicesnap
spec:
  replicas: 2
  selector:
    matchLabels:
      app: invoicesnap
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: invoicesnap
    spec:
      containers:
        - name: invoicesnap
          image: ghcr.io/ronalc90/invoice-snap:latest
          ports:
            - containerPort: 3003
              protocol: TCP
          envFrom:
            - configMapRef:
                name: invoicesnap-config
            - secretRef:
                name: invoicesnap-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3003
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3003
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      restartPolicy: Always
