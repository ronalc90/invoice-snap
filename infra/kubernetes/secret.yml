# IMPORTANTE: Este archivo es un template.
# Los valores reales deben configurarse con:
#   kubectl create secret generic invoicesnap-secrets \
#     --from-literal=DATABASE_URL='postgresql://...' \
#     --from-literal=NEXTAUTH_SECRET='...' \
#     --from-literal=RESEND_API_KEY='re_...' \
#     -n invoicesnap
#
# NUNCA commitear secretos reales en el repositorio.

apiVersion: v1
kind: Secret
metadata:
  name: invoicesnap-secrets
  namespace: invoicesnap
  labels:
    app: invoicesnap
type: Opaque
stringData:
  DATABASE_URL: "postgresql://invoicesnap:CHANGE_ME@postgres:5432/invoicesnap"
  NEXTAUTH_SECRET: "CHANGE_ME_IN_PRODUCTION"
  RESEND_API_KEY: "re_CHANGE_ME"
